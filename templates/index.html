<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Vagas Daniel</title>

<style>
body {
    margin: 0;
    font-family: "Segoe UI", Arial;
    background: radial-gradient(circle at top, #111 0%, #000 100%);
    color: #fff;
}

/* HEADER */
header {
    padding: 18px;
    text-align: center;
    font-size: 22px;
    font-weight: bold;
    letter-spacing: 2px;
    background: #0a0a0a;
    border-bottom: 1px solid #222;
}

/* TOP BAR */
.topbar {
    display: flex;
    gap: 10px;
    justify-content: center;
    padding: 15px;
}

input {
    padding: 10px;
    width: 260px;
    border-radius: 8px;
    border: none;
    outline: none;
}

/* BOTÕES */
button {
    padding: 10px 14px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: #1f1f1f;
    color: #fff;
    transition: 0.2s;
}

button:hover {
    background: #ff0033;
    box-shadow: 0 0 10px #ff0033;
}

/* ABAS */
.tabs {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin: 10px 0;
}

.tab-btn {
    background: #111;
    border: 1px solid #333;
}

.tab-btn.active {
    background: #ff0033;
    box-shadow: 0 0 12px #ff0033;
}

/* CONTAINER */
.container {
    display: flex;
    justify-content: center;
    padding: 20px;
}

/* PAINEL */
.panel {
    width: 80%;
    display: none;
    animation: fade 0.3s ease-in;
}

.panel.active {
    display: block;
}

/* CARDS */
.card {
    background: linear-gradient(145deg, #111, #0a0a0a);
    border: 1px solid #222;
    padding: 15px;
    margin-bottom: 12px;
    border-radius: 12px;
    transition: 0.2s;
}

.card:hover {
    transform: scale(1.02);
    border-color: #ff0033;
    box-shadow: 0 0 15px rgba(255,0,51,0.3);
}

.title {
    font-size: 16px;
    font-weight: bold;
    color: #ff0033;
}

.small {
    font-size: 12px;
    color: #aaa;
}

/* BOTÃO APLICAR */
.apply {
    margin-top: 8px;
    background: #00c853;
}

.apply:hover {
    background: #00e676;
    box-shadow: 0 0 10px #00e676;
}

/* ANIMAÇÃO */
@keyframes fade {
    from {opacity: 0; transform: translateY(10px);}
    to {opacity: 1; transform: translateY(0);}
}

</style>
</head>

<body>

<header>🔥 VAGAS DANIEL 🔥</header>

<div class="topbar">
    <input id="search" placeholder="Buscar vagas..." />
    <button onclick="loadJobs(12)">12h</button>
    <button onclick="loadJobs(24)">24h</button>
</div>

<div class="tabs">
    <button class="tab-btn active" onclick="showTab('jobs')">Vagas disponíveis</button>
    <button class="tab-btn" onclick="showTab('applied')">Vagas aplicadas</button>
</div>

<div class="container">

    <!-- VAGAS DISPONÍVEIS -->
    <div id="jobs" class="panel active"></div>

    <!-- VAGAS APLICADAS -->
    <div id="applied" class="panel"></div>

</div>

<script>

let currentHours = 24;

function showTab(tab) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));

    if(tab === 'jobs') {
        document.getElementById('jobs').classList.add('active');
        document.querySelectorAll('.tab-btn')[0].classList.add('active');
    } else {
        document.getElementById('applied').classList.add('active');
        document.querySelectorAll('.tab-btn')[1].classList.add('active');
    }
}

async function loadJobs(hours = currentHours) {
    currentHours = hours;

    const q = document.getElementById("search").value;
    const res = await fetch(`/api/jobs?q=${q}&hours=${hours}`);
    const data = await res.json();

    const el = document.getElementById("jobs");
    el.innerHTML = "";

    data.forEach(job => {
        el.innerHTML += `
            <div class="card">
                <div class="title">${job.title}</div>
                <div>${job.company}</div>
                <div class="small">${job.posted_at}</div>

                <button class="apply" onclick='applyJob(${JSON.stringify(job)})'>
                    ✔ Já apliquei
                </button>
            </div>
        `;
    });

    loadApplied();
}

async function applyJob(job) {
    await fetch("/api/apply", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(job)
    });

    loadJobs(currentHours);
}

async function loadApplied() {
    const res = await fetch("/api/applied");
    const data = await res.json();

    const el = document.getElementById("applied");
    el.innerHTML = "";

    data.forEach(job => {
        el.innerHTML += `
            <div class="card">
                <div class="title">${job.title}</div>
                <div>${job.company}</div>
                <div class="small">${job.applied_at}</div>
            </div>
        `;
    });
}

loadJobs(24);

</script>

</body>
</html>
