<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Vagas Daniel</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b0b0b;
    color: white;
}

header {
    text-align: center;
    padding: 15px;
    background: #111;
    font-size: 20px;
    font-weight: bold;
}

.topbar {
    display: flex;
    justify-content: center;
    gap: 10px;
    padding: 10px;
}

input {
    padding: 10px;
    width: 250px;
}

.tabs {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin: 10px;
}

.tab {
    background: #222;
    border: none;
    color: white;
    padding: 10px;
    cursor: pointer;
}

.tab.active {
    background: #ff0033;
}

.container {
    display: flex;
    justify-content: center;
}

.panel {
    width: 70%;
    display: none;
}

.panel.active {
    display: block;
}

.card {
    background: #151515;
    margin: 10px 0;
    padding: 12px;
    border-radius: 8px;
}

.title {
    color: #ff0033;
    font-weight: bold;
}

.small {
    font-size: 12px;
    color: #aaa;
}

.btn {
    margin-top: 8px;
    display: flex;
    gap: 10px;
}

button {
    cursor: pointer;
}

.apply {
    background: green;
    color: white;
    border: none;
    padding: 6px 10px;
    border-radius: 6px;
}

.link {
    background: #00b894;
    color: white;
    padding: 6px 10px;
    text-decoration: none;
    border-radius: 6px;
    font-size: 12px;
}
</style>
</head>

<body>

<header>VAGAS DANIEL</header>

<div class="topbar">
    <input id="search" placeholder="Buscar vagas..." oninput="loadJobs()" />
    <button onclick="loadJobs(12)">12h</button>
    <button onclick="loadJobs(24)">24h</button>
</div>

<div class="tabs">
    <button class="tab active" onclick="show('jobs')">Disponíveis</button>
    <button class="tab" onclick="show('applied')">Aplicadas</button>
</div>

<div class="container">

    <div id="jobs" class="panel active"></div>
    <div id="applied" class="panel"></div>

</div>

<script>

let currentHours = 24;

function show(tab) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));

    if(tab === 'jobs') {
        document.getElementById('jobs').classList.add('active');
        document.querySelectorAll('.tab')[0].classList.add('active');
    } else {
        document.getElementById('applied').classList.add('active');
        document.querySelectorAll('.tab')[1].classList.add('active');
    }
}

async function loadJobs(hours = currentHours) {

    currentHours = hours;

    const q = document.getElementById("search").value;

    const res = await fetch(`/api/jobs?q=${q}&hours=${hours}`);
    const data = await res.json();

    const el = document.getElementById("jobs");
    el.innerHTML = "";

    data.forEach(job => {

        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <div class="title">${job.title}</div>
            <div>${job.company}</div>
            <div class="small">${job.posted_at}</div>

            <div class="btn">
                <button class="apply">Já apliquei</button>

                <a class="link" href="${job.url}" target="_blank">
                    Ver vaga
                </a>
            </div>
        `;

        div.querySelector(".apply").onclick = () => applyJob(job);

        el.appendChild(div);
    });

    loadApplied();
}

async function applyJob(job) {
    await fetch("/api/apply", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(job)
    });

    loadJobs(currentHours);
}

async function loadApplied() {
    const res = await fetch("/api/applied");
    const data = await res.json();

    const el = document.getElementById("applied");
    el.innerHTML = "";

    data.forEach(job => {
        el.innerHTML += `
            <div class="card">
                <div class="title">${job.title}</div>
                <div>${job.company}</div>
                <div class="small">${job.applied_at || ''}</div>
            </div>
        `;
    });
}

loadJobs(24);

</script>

</body>
</html>
